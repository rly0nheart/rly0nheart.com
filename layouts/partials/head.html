<head>
  <meta charset="utf-8" />
<meta name="follow.it-verification-code" content="S6c6x42yqfzfmKRQw4zv" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="{{ .Site.Params.description }}" />
  {{ if (eq .Title .Site.Title) }}
    {{ with $title := .Title }}
<title>{{ . }}</title>
    {{ end }}
  {{ else }}
    {{ with $title := printf "%s | %s" .Title .Site.Title }}
<title>{{ . }}</title>
    {{ end }}
  {{ end }}
<link rel="stylesheet" href="{{ "css/reset.css" | relURL }}"/>
<link rel="stylesheet" href="{{ "css/font.css" | relURL }}"/>
<link rel="stylesheet" href="{{ "css/smigle.css" | relURL }}"/>
<link rel="stylesheet" href="{{ "css/subscribe.css" | relURL }}"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  {{ range .Site.Params.customStylesheets }}
<link rel="stylesheet" href="{{ . | relURL }}"/>
  {{ end }}
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
<meta name="msapplication-TileColor" content="#da532c">
<meta name="theme-color" content="#ffffff">
<!--Handles the button that shows more items in tab or footer (mobile view)-->
<script>
  document.addEventListener('DOMContentLoaded',function(){const down='▼',up='▲';document.querySelectorAll('.expand-toggle').forEach(b=>{b.addEventListener('click',function(){const c=this.closest('nav,footer'),k=c.tagName==='NAV'?'navExpanded':'footerExpanded',e=c.classList.toggle('expanded');this.textContent=e?up:down;e?sessionStorage.setItem(k,'true'):sessionStorage.removeItem(k)})});['navExpanded','footerExpanded'].forEach((k,i)=>{if(sessionStorage.getItem(k)==='true'){const e=document.querySelector(i?'#main-footer':'#main-nav');if(e){e.classList.add('expanded');const b=e.querySelector('.expand-toggle');b&&(b.textContent=up)}}})});
</script>
<!--Handles the theme toggle button (dark/light mode)-->
<script>
  (function(){const sunIcon=`<i class="fa-solid fa-sun"></i>`,moonIcon=`<i class="fa-solid fa-moon"></i>`,g=()=>{const s=localStorage.getItem('theme');return s?s:window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'},s=t=>{document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t)};s(g());const initialTheme=g(),initialIcon=initialTheme==='light'?moonIcon:sunIcon;document.addEventListener('DOMContentLoaded',()=>{const b=document.querySelector('.theme-toggle');if(b){b.innerHTML=initialIcon;b.classList.add('loaded');b.addEventListener('click',()=>{const c=document.documentElement.getAttribute('data-theme'),newTheme=c==='light'?'dark':'light';s(newTheme);b.innerHTML=newTheme==='light'?moonIcon:sunIcon})}})})();
</script>
</head>
