<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="{{ .Site.Params.description }}" />
  
  {{ if (eq .Title .Site.Title) }}
    {{ with $title := .Title }}
      <title>{{ . }}</title>
    {{ end }}
  {{ else }}
    {{ with $title := printf "%s | %s" .Title .Site.Title }}
      <title>{{ . }}</title>
    {{ end }}
  {{ end }}
  
  <link rel="stylesheet" href="{{ "css/reset.css" | relURL }}"/>
  <link rel="stylesheet" href="{{ "css/font.css" | relURL }}"/>
  <link rel="stylesheet" href="{{ "css/smigle.css" | relURL }}"/>
  {{ range .Site.Params.customStylesheets }}
    <link rel="stylesheet" href="{{ . | relURL }}"/>
  {{ end }}
  
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#ffffff">
  
  <!--Handles the button that shows more items in tab or footer (mobile view)-->
  <script defer>
    document.addEventListener('DOMContentLoaded',function(){document.querySelectorAll('header .expand-toggle').forEach(a=>{a.addEventListener('click',function(){const b=this.closest('nav');b.classList.toggle('expanded');const c=b.classList.contains('expanded'),d=Array.from(this.childNodes).find(a=>a.nodeType===Node.TEXT_NODE);d&&(d.textContent=c?'▲':'▼'),c?sessionStorage.setItem('navExpanded','true'):sessionStorage.removeItem('navExpanded')})});document.querySelectorAll('footer .expand-toggle').forEach(a=>{a.addEventListener('click',function(){const b=this.closest('footer');b.classList.toggle('expanded');const c=b.classList.contains('expanded'),d=Array.from(this.childNodes).find(a=>a.nodeType===Node.TEXT_NODE);d&&(d.textContent=c?'▲':'▼'),c?sessionStorage.setItem('footerExpanded','true'):sessionStorage.removeItem('footerExpanded')})});if('true'===sessionStorage.getItem('navExpanded')){const a=document.querySelector('#main-nav');if(a){a.classList.add('expanded');const b=a.querySelector('.expand-toggle');if(b){const a=Array.from(b.childNodes).find(a=>a.nodeType===Node.TEXT_NODE);a&&(a.textContent='▲')}}}if('true'===sessionStorage.getItem('footerExpanded')){const a=document.querySelector('#main-footer');if(a){a.classList.add('expanded');const b=a.querySelector('.expand-toggle');if(b){const a=Array.from(b.childNodes).find(a=>a.nodeType===Node.TEXT_NODE);a&&(a.textContent='▲')}}}});
  </script>
</head>
