    <div class="followit--follow-form-container" attr-a attr-b attr-c attr-d attr-e attr-f>
      <form action="https://api.follow.it/subscription-form/S1BkWDJHeHpXSXZWRFFkRENHOVI3MmR3OE55YitUS2FKT1dDbUNidndEUTUvb3ZBUlEwbkI4Y3Z6MU5pTGNWVVo5WHpVMElJYytoOVRoa0FKekJaZlQzNzd1UUVyVjFqZUx6Y2ovNEZoR0EwSyt4RnFSU2JCOVN2NDh1RGVGdDd8VWhHQkw3L2l0VjJUcjgyZ1Q3M240ZlZJaS8zSlUrVzBQNjlKQ0VNS3V2WT0=/8" method="post">
        <div class="form-preview">
          <div class="preview-heading">
            <h5>Get new posts by email:</h5>
          </div>
          <div class="preview-input-field">
            <input type="email" name="email" required placeholder="your@email.com" spellcheck="false">
          </div>
          <div class="preview-submit-button">
            <button type="submit">[Subscribe]</button>
          </div>
        </div>
      </form>

    </div>
  </div>
</div>

<script>
function openSubscribePopup() {
  document.getElementById('subscribe-popup').classList.add('active');
}

function closeSubscribePopup() {
  document.getElementById('subscribe-popup').classList.remove('active');
}

// Close popup when clicking outside
document.getElementById('subscribe-popup').addEventListener('click', function(e) {
  if (e.target === this) {
    closeSubscribePopup();
  }
});

// Close popup with Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeSubscribePopup();
  }
});
</script>
